<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario Estrategico de Stocks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Stock Calendar</p>
        <h1>Fechas importantes para invertir con mas criterio</h1>
        <p class="sub">
          Enfocado en eventos que suelen mover precio: utilidades, guidance y datos macro.
          No garantiza rentabilidad; sirve para planificar entradas con menos impulso.
        </p>
      </header>

      <section class="panel controls">
        <div class="control">
          <label for="monthFilter">Mes</label>
          <select id="monthFilter">
            <option value="all">Todos</option>
          </select>
        </div>
        <div class="control">
          <label for="typeFilter">Tipo</label>
          <select id="typeFilter">
            <option value="all">Todos</option>
            <option value="earnings">Earnings</option>
            <option value="macro">Macro</option>
            <option value="watch">Watchlist</option>
          </select>
        </div>
        <div class="control">
          <label for="impactFilter">Impacto</label>
          <select id="impactFilter">
            <option value="all">Todos</option>
            <option value="high">Alto</option>
            <option value="medium">Medio</option>
            <option value="low">Bajo</option>
          </select>
        </div>
      </section>

      <section class="panel watchlist">
        <h2>Watchlist sugerida (calidad + crecimiento)</h2>
        <div class="chips" id="watchlistChips"></div>
      </section>

      <section class="panel timeline-panel">
        <div class="timeline-head">
          <h2>Calendario</h2>
          <span id="eventCounter">0 eventos</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <template id="eventTemplate">
      <article class="event-card">
        <div class="event-top">
          <span class="badge date"></span>
          <span class="badge impact"></span>
          <span class="badge type"></span>
        </div>
        <h3 class="title"></h3>
        <p class="meta"></p>
        <p class="note"></p>
        <p class="source"></p>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
  </html>
